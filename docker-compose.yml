services:
  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./generated:/app/generated

  worker:
    build: .
    env_file: .env
    command: celery -A shopee_affiliate.celery_app.celery_app worker --loglevel=INFO
    depends_on:
      - postgres
      - redis
    volumes:
      - ./generated:/app/generated

  beat:
    build: .
    env_file: .env
    command: celery -A shopee_affiliate.celery_app.celery_app beat --loglevel=INFO
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shopee_affiliate
      POSTGRES_USER: shopee
      POSTGRES_PASSWORD: shopee
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:

